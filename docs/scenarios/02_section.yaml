id: doc_readme_section_label
description: Scenario with section filter
view_path: doc-readme-section-label

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255
  - type: ha_service
    domain: switch
    service: turn_on
    data:
      entity_id: switch.decorative_lights
  - type: ha_service
    domain: switch
    service: turn_on
    data:
      entity_id: switch.ac

card:
  type: custom:auto-entities
  card:
    type: entities
  filter:
    include:
      - domain: light
      - type: section
        label: Switches
      - domain: switch
    exclude:
      - entity_id: light.all_lights
      - entity_id: light.all_lights_group

doc_image:
  output: docs/source/assets/images/02_section_label.png
  root: auto-entities
  padding: 16
  threshold: 0.02