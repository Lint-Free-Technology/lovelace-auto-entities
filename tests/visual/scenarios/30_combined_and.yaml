id: combined_and
description: 'combined: And'
view_path: combined-and
setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.all_lights
setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
    - and:
      - domain: light
        device: '*'
      - state: 'on'
assertions:
- type: snapshot
  name: 30_combined_and
  threshold: 0.02
