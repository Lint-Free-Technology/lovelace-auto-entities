id: name
description: Scenario with name filter  
view_path: name

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - name: Bed Light

assertions:
  - type: snapshot
    name: "04_name"
    threshold: 0.02