id: matching_comparison
description: 'matching: Comparison #1'
view_path: matching-comparison
card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
    - attributes:
        brightness: '>50'
    - type: section
    - attributes:
        brightness: <150
    - type: section
    - attributes:
        brightness: '!255'
    - type: section
    - attributes 1:
        brightness: '>50'
      attributes 2:
        brightness: <150
    - type: section
    - attributes:
        brightness 1: '>50'
        brightness 2: <150
assertions:
- type: snapshot
  name: 19_matching_comparison
  threshold: 0.02
