id: rename_per_filter_rename_with_eval_js_prepend_area
description: 'rename: Rename – per-filter rename with eval_js (prepend area) #1'
view_path: rename-per-filter-rename-with-eval-js-prepend-area
setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255
  - type: device_registry_update
    entity_id: light.bed_light
    area_name: bedroom
  - type: device_registry_update
    entity_id: light.kitchen_lights
    area_name: kitchen
card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
    - entity_id: light.bed_light
    - entity_id: light.kitchen_lights
      rename:
        method: friendly_name
        prepend: '${area ? area + '': '' : ''''}'
        eval_js: true
assertions:
- type: snapshot
  name: 43_rename_per_filter_rename_with_eval_js_prepend_area
  threshold: 0.02
