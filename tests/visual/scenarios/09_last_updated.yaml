id: last_updated
description: Scenario with last updated filter  
view_path: last-updated

# last_updated is minutes or greater

setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.bed_light
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - last_updated: "< 5"
        entity_id: light.bed_light
      - type: section
      - last_updated: "> 5"
        entity_id: light.bed

assertions:
  - type: snapshot
    name: "09_last_updated"
    threshold: 0.02
