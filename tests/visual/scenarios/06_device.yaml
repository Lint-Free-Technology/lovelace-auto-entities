id: device
description: Scenario with device filter  
view_path: device

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - device: Bed Light

assertions:
  - type: snapshot
    name: "06_device"
    threshold: 0.02
