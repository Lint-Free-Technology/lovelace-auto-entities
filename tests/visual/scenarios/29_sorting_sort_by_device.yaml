id: sorting_sort_by_device
description: 'sorting: Sort by device'
view_path: sorting-sort-by-device

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - domain: light
        device: '*'
        sort:
          method: device

assertions:
  - type: snapshot
    name: 29_sorting_sort_by_device
    threshold: 0.02
