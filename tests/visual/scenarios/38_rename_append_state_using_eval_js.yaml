id: rename_append_state_using_eval_js
description: 'rename: Rename – append state using eval_js #1'
view_path: rename-append-state-using-eval-js
setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255
card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
    - domain: light
  rename:
    method: friendly_name
    append: ' (${state})'
    eval_js: true
  sort:
    count: 10
assertions:
- type: snapshot
  name: 38_rename_append_state_using_eval_js
  threshold: 0.02
