id: template_updating_template
description: 'template: Updating template #1'
view_path: template-updating-template

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255

setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.bed_light

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    template: '{{ states.light

      | selectattr("state", "==", "off")

      | map(attribute="entity_id")

      | list

      }}

      '

assertions:
  - type: snapshot
    name: 25_template_updating_template
    threshold: 0.02
