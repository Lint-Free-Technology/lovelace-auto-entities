id: state_object_filter_operator_value
description: "State filter: operator and value comparison"
view_path: state-object-filter-operator-value

setup:
  - type: ha_service
    domain: input_number
    service: set_value
    data:
      entity_id: input_number.slider
      value: 50

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - entity_id: input_number.slider
        state:
          operator: "<"
          value: "100"

assertions:
  - type: snapshot
    name: "53_state_object_filter_operator_value"
    threshold: 0.02
