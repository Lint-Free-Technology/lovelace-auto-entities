id: combined_not
description: 'combined: Not'
view_path: combined-not
setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.all_lights
setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
    - state: 'on'
      entity_id: /lights$/
      not:
        domain: light
assertions:
- type: snapshot
  name: 32_combined_not
  threshold: 0.02
