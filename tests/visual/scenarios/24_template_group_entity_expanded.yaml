id: template_group_entity_expanded
description: 'template: Group entity expanded #1'
view_path: template-group-entity-expanded
setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255
card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
    - group: light.all_lights_group
      options:
        type: custom:auto-entities
        card: 
          type: entities
          show_header_toggle: false
        filter:
          template: '{{state_attr(config.entity, ''entity_id'')}}'
assertions:
- type: snapshot
  name: 24_template_group_entity_expanded
  threshold: 0.02
