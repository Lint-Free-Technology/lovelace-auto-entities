id: entity
description: Scenario with entity filter  
view_path: entity

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - entity_id: light.bed_light

assertions:
  - type: snapshot
    name: "02_entity"
    threshold: 0.02
