id: state_object_filter_list
description: "State filter: list format (implied AND)"
view_path: state-object-filter-list

setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.all_lights
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.ceiling_lights
      brightness: 128

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - domain: light
        state:
          - operator: "!="
            value: "off"
          - value: "on"
    exclude:
      - entity_id: light.all_lights
      - entity_id: light.all_lights_group

assertions:
  - type: snapshot
    name: "51_state_object_filter_list"
    threshold: 0.02
