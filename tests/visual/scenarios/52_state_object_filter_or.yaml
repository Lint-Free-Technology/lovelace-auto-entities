id: state_object_filter_or
description: "State filter: OR format (matches on or off)"
view_path: state-object-filter-or

setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.all_lights
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.ceiling_lights
      brightness: 128

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - domain: light
        state:
          or:
            - "on"
            - "off"
    exclude:
      - entity_id: light.all_lights
      - entity_id: light.all_lights_group
      - entity_id: light.kitchen_lights
      - entity_id: light.living_room_rgbww_lights
      - entity_id: light.office_rgbw_lights
      - entity_id: light.entrance_color_white_lights

assertions:
  - type: snapshot
    name: "52_state_object_filter_or"
    threshold: 0.02
