id: rename_use_device_name_as_the_entity_name
description: 'rename: Rename – use device name as the entity name #1'
view_path: rename-use-device-name-as-the-entity-name
setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights
      brightness: 255
card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
    - domain: light
      device: '*'
  rename:
    method: device
assertions:
- type: snapshot
  name: 41_rename_use_device_name_as_the_entity_name
  threshold: 0.02
