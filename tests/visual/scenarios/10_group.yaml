id: group
description: Scenario with group filter  
view_path: group

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.all_lights

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - group: light.all_lights

assertions:
  - type: snapshot
    name: "10_group"
    threshold: 0.02
