id: state_object_filter_ignore_case
description: "State filter: support ignore_case option"
view_path: state-object-filter-ignore-case

setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.all_lights
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.ceiling_lights
      brightness: 255

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - domain: light
        state:
          value: "ON"
          ignore_case: true
    exclude:
      - entity_id: light.all_lights
      - entity_id: light.all_lights_group

assertions:
  - type: snapshot
    name: "55_state_object_filter_ignore_case"
    threshold: 0.02
