id: state
description: Scenario with state filter  
view_path: state

setup:
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.all_lights
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.ceiling_lights
      brightness: 255

card:
  type: custom:auto-entities
  card:
    type: entities
    show_header_toggle: false
  filter:
    include:
      - domain: light
        state: "on"
    exclude:
      - entity_id: light.all_lights

assertions:
  - type: snapshot
    name: "03_state"
    threshold: 0.02
