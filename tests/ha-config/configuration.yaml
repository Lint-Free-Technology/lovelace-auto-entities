homeassistant:
  country: US
  unit_system: metric
  time_zone: UTC
  customize: !include customize.yaml

default_config:

frontend:
  themes: !include_dir_merge_named themes

demo:

lovelace:
  mode: storage
  resource_mode: yaml
  resources: !include lovelace_resources.yaml

input_boolean:
  test_toggle:
    name: Test Toggle

input_number:
  slider:
    name: Input number
    min: 0
    max: 200
    step: 25

input_select:
  select:
    name: Input select
    options:
      - A
      - B
      - C

timer:
  demo_timer:
    duration: '00:10:00'
    name: Demo timer

light:
  - platform: group
    name: "All Lights"
    entities:
      - light.bed_light
      - light.ceiling_lights
      - light.kitchen_lights
      - light.living_room_rgbww_lights
      - light.office_rgbw_lights
      - light.entrance_color_white_lights
  - platform: group
    name: "All Lights Group"
    entities:
      - light.all_lights

template:
  - sensor: { name: ip1, state: 192.168.1.10 }
  - sensor: { name: ip2, state: 192.168.1.100 }
  - sensor: { name: ip3, state: 192.168.1.2 }
